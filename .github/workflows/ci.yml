name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skill package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Validate skill package
        run: python scripts/validate_skill.py skills/copilot-sdk

      - name: Check upstream source links
        run: python scripts/check_upstream_sources.py

      - name: Test Copilot SDK eval harness
        working-directory: eval-harness
        run: go test ./...
